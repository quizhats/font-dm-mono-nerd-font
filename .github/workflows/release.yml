name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC token for provenance attestation
      attestations: write   # write the build provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch fonts
        run: ./scripts/patch.sh

      - name: Verify patched output
        run: |
          python3 -m pip install --quiet fonttools==4.63.0
          python3 scripts/verify.py out

      - name: Package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package.sh "$VERSION"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.zip
            dist/*.ttf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.zip
            dist/*.sha256
            dist/*.ttf
