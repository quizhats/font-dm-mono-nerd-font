name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release
      id-token: write       # OIDC token for provenance attestation
      attestations: write   # write the build provenance attestation
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch fonts
        run: ./scripts/patch.sh

      - name: Verify patched output
        run: |
          python3 -m pip install --quiet fonttools==4.63.0
          python3 scripts/verify.py out

      - name: Package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package.sh "$VERSION"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/*.zip
            dist/*.ttf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
            dist/*.ttf
